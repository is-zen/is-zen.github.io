		<h2 align="left">蓮花</h2>
		<p align="left"><font color="#808080">　　夏季是蓮花盛開的時節，每年此時湖中開遍白色的蓮花，彷彿來自諸神的禮讚，為精進不懈的佛子們帶來祝福。

在不同的角落，蓮花們或成群綻放，或幽幽獨處湖中掩映的蓮葉間，或是在透亮的晨光中含苞挺立，或在雨後凝露欲滴，展現了萬千丰采。 </font>
