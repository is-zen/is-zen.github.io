		<h2 align="left">講堂內景</h2>
		<p align="left"><font color="#808080">　　與禪堂相鄰接的講堂是多功能的使用空間，劃分為綜合講堂及辦公區。講堂兼具上課教室與活動中心的功能，並收藏了如是禪中心出版品與宗教修行類的圖書，是學員們精神食糧所在。空間中的擺設採取開放型式，隨時可靈活搬移調整為大型聚會的活動場地。

辦公區則劃分為管理、財務、資訊、教學等部門，負責資訊蒐整、書籍出版及對內對外教學計劃的弘法重任。 </font>
